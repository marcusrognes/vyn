<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="color-scheme" content="light dark">
		<title>__VYN_APP_NAME__</title>
		<link rel="stylesheet" href="/style.css">
		<script>
			// Pre-paint theme so there's no flash. The matching component
			// in main.ts takes over interactive behavior once it mounts.
			(() => {
				const saved = localStorage.getItem("theme");
				const mode = saved ?? "system";
				const dark = mode === "dark" ||
					(mode === "system" &&
						matchMedia("(prefers-color-scheme: dark)").matches);
				document.documentElement.dataset.theme = mode;
				document.documentElement.classList.toggle("dark", dark);
			})();
		</script>
	</head>
	<body>
		<nav class="topbar">
			<a class="brand" href="/" data-link aria-label="Home">
				<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
					<rect x="2" y="2" width="20" height="20" rx="5" fill="#4f46e5" />
					<path
						d="M7 11 L11 16 L17 7"
						stroke="white"
						stroke-width="2.4"
						stroke-linecap="round"
						stroke-linejoin="round"
						fill="none"
					/>
				</svg>
				<span>vyn</span>
			</a>
			<div class="links">
				<a href="/" data-link>Home</a>
				<a href="/todos" data-link>Todos</a>
			</div>
			<theme-toggle class="theme-toggle" title="Theme">
				<svg
					class="i i-system"
					viewBox="0 0 24 24"
					width="18"
					height="18"
					aria-hidden="true"
				>
					<rect
						x="3"
						y="5"
						width="18"
						height="13"
						rx="2"
						fill="none"
						stroke="currentColor"
						stroke-width="1.7"
					/>
					<path
						d="M8 21h8M12 18v3"
						stroke="currentColor"
						stroke-width="1.7"
						stroke-linecap="round"
					/>
				</svg>
				<svg
					class="i i-light"
					viewBox="0 0 24 24"
					width="18"
					height="18"
					aria-hidden="true"
				>
					<circle cx="12" cy="12" r="4" fill="currentColor" />
					<g stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
						<path d="M12 3v2" />
						<path d="M12 19v2" />
						<path d="M3 12h2" />
						<path d="M19 12h2" />
						<path d="M5.6 5.6l1.4 1.4" />
						<path d="M17 17l1.4 1.4" />
						<path d="M5.6 18.4l1.4-1.4" />
						<path d="M17 7l1.4-1.4" />
					</g>
				</svg>
				<svg
					class="i i-dark"
					viewBox="0 0 24 24"
					width="18"
					height="18"
					aria-hidden="true"
				>
					<path
						d="M20 14.5A8 8 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"
						fill="currentColor"
					/>
				</svg>
				<span data-label class="sr-only">System</span>
			</theme-toggle>
		</nav>

		<main id="app"></main>

		<script type="module" src="/main.js"></script>
	</body>
</html>
