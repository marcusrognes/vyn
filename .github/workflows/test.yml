name: Test

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "vitest.workspace.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test
