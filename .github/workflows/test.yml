name: Test

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "deno.json"
      - "deno.lock"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck
        run: deno task check

      - name: Run tests
        run: deno task test
