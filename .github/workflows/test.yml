name: Test

# Disabled for now — DOM-dependent tests (packages/ui/**) fail under
# plain `deno test` because Deno has no document/window. Re-enable
# once tests either get a DOM polyfill (deno-dom, jsdom) or split
# into headless / browser jobs.
on:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Typecheck
              run: deno task check

            - name: Run tests
              run: deno task test
