name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents:   read
      id-token:   write   # OIDC for JSR — no token needed
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test
        run: deno task test

      - name: Publish JSR packages
        run: deno publish

  npm-create-vyn:
    name: Publish create-vyn to npm
    runs-on: ubuntu-latest
    needs: jsr
    permissions:
      contents:   read
      id-token:   write   # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish create-vyn
        working-directory: packages/create-vyn
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
